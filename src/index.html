<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <title>QuickLaunch</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- 상단 바 -->
    <header class="topbar">
      <div class="brand">
        <span class="logo">⚡</span>
        <span class="brand-name">QuickLaunch</span>
      </div>

      <nav class="deck-tabs" id="deckTabs"></nav>

      <div class="topbar-actions">
        <input id="searchInput" class="search" type="text" placeholder="🔍 검색…" />
        <div class="layout-switch" id="layoutSwitch">
          <button data-layout="3x3">3×3</button>
          <button data-layout="5x3">5×3</button>
          <button data-layout="5x4">5×4</button>
        </div>
        <button id="editToggle" class="icon-btn" title="편집 모드">✏️</button>
        <button id="libraryBtn" class="icon-btn" title="라이브러리">📚</button>
        <button id="importBtn" class="icon-btn" title="가져오기">📥</button>
        <button id="exportBtn" class="icon-btn" title="내보내기">📤</button>
        <button id="settingsBtn" class="icon-btn" title="설정">⚙️</button>
      </div>
    </header>

    <!-- 메인 그리드 -->
    <main class="stage">
      <div id="grid" class="grid"></div>
      <div id="emptyHint" class="empty-hint hidden">
        편집 모드(✏️)를 켜고 빈 칸을 눌러 바로가기를 추가하세요.
      </div>
    </main>

    <footer class="statusbar">
      <span id="statusText">준비됨</span>
      <span class="spacer"></span>
      <span id="hotkeyHint"></span>
    </footer>

    <!-- 버튼 편집 모달 -->
    <div id="editModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="editTitle">바로가기 추가</h2>
          <button class="close-x" data-close="editModal">✕</button>
        </div>

        <div class="tabs" id="editTabs">
          <button class="tab active" data-tab="library">📚 라이브러리</button>
          <button class="tab" data-tab="custom">✍️ 직접 입력</button>
          <button class="tab" data-tab="hotkey">⌨️ 키보드 단축키</button>
        </div>

        <!-- 라이브러리 탭 -->
        <section class="tab-pane active" data-pane="library">
          <div id="libPicker" class="lib-picker"></div>
        </section>

        <!-- 직접 입력 탭 -->
        <section class="tab-pane" data-pane="custom">
          <label>이름</label>
          <input id="f_label" type="text" placeholder="예: 사내 그룹웨어" />

          <label>유형</label>
          <select id="f_type">
            <option value="url">웹사이트 (URL)</option>
            <option value="app">앱 / 실행파일</option>
            <option value="file">파일 열기</option>
            <option value="folder">폴더 열기</option>
            <option value="command">명령어 실행</option>
          </select>

          <label>대상 <button id="pickPathBtn" class="mini-btn hidden" type="button">📁 찾아보기</button></label>
          <input id="f_target" type="text" placeholder="https://… 또는 경로 / 명령" />
        </section>

        <!-- 키보드 단축키 탭 -->
        <section class="tab-pane" data-pane="hotkey">
          <label>이름</label>
          <input id="f_hk_label" type="text" placeholder="예: 값만 붙여넣기" />
          <label>키 조합 (눌러서 입력)</label>
          <input id="f_hk_combo" type="text" placeholder="이 칸을 클릭 후 키를 누르세요 (예: Ctrl+Shift+V)" readonly />
          <p class="hint">Ctrl / Alt / Shift + 키 조합을 지원합니다. (Win 키 제외)</p>
        </section>

        <!-- 아이콘 & 색상 (공통) -->
        <div class="appearance">
          <div class="appearance-col">
            <label>아이콘</label>
            <div class="preview-tile" id="previewTile"><span id="previewIcon">📁</span></div>
            <button id="textOnlyBtn" class="mini-btn" type="button">텍스트만 사용</button>
          </div>
          <div class="appearance-col grow">
            <label>아이콘 선택</label>
            <div id="iconGrid" class="icon-grid"></div>
            <label>배경 색상</label>
            <div id="colorGrid" class="color-grid"></div>
          </div>
        </div>

        <div class="modal-foot">
          <button id="deleteBtn" class="danger hidden">삭제</button>
          <span class="spacer"></span>
          <button class="ghost" data-close="editModal">취소</button>
          <button id="saveBtn" class="primary">저장</button>
        </div>
      </div>
    </div>

    <!-- 라이브러리 모달 (전체 보기) -->
    <div id="libraryModal" class="modal hidden">
      <div class="modal-card wide">
        <div class="modal-head">
          <h2>📚 바로가기 라이브러리 — 구매업무 추천</h2>
          <button class="close-x" data-close="libraryModal">✕</button>
        </div>
        <p class="hint">항목을 클릭하면 현재 덱에 추가됩니다.</p>
        <div id="libraryFull" class="library-full"></div>
      </div>
    </div>

    <!-- 설정 모달 -->
    <div id="settingsModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <h2>⚙️ 설정</h2>
          <button class="close-x" data-close="settingsModal">✕</button>
        </div>

        <label>전역 단축키 (창 열기/숨기기)</label>
        <input id="s_hotkey" type="text" value="CommandOrControl+Shift+Space" />
        <p class="hint">예: CommandOrControl+Shift+Space, Alt+Q</p>

        <label>테마</label>
        <select id="s_theme">
          <option value="dark">다크</option>
          <option value="light">라이트</option>
        </select>

        <label>덱 관리</label>
        <div class="deck-manage">
          <input id="newDeckName" type="text" placeholder="새 덱 이름" />
          <button id="addDeckBtn" class="mini-btn">+ 덱 추가</button>
          <button id="renameDeckBtn" class="mini-btn">현재 덱 이름변경</button>
          <button id="deleteDeckBtn" class="mini-btn danger">현재 덱 삭제</button>
        </div>

        <div class="modal-foot">
          <button id="resetBtn" class="danger">전체 초기화</button>
          <span class="spacer"></span>
          <button class="primary" data-close="settingsModal">닫기</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="icons.js"></script>
    <script src="library.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
