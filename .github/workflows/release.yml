name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1)'
        required: true
        default: 'v1.0.1'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run build

      - name: Upload portable exe to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/QuickLaunch.exe
            src-tauri/target/release/bundle/nsis/*.exe
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: QuickLaunch ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## 다운로드

            | 파일 | 설명 |
            |---|---|
            | `QuickLaunch.exe` | **포터블 실행파일** (설치 불필요, 그냥 실행) |
            | `QuickLaunch_*_x64-setup.exe` | 인스톨러 버전 |

            > Windows 10/11 이상 필요 (WebView2 내장)
